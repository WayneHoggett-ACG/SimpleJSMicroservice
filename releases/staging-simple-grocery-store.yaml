apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: staging-simple-grocery-store
  namespace: flux-system  # Using GitRepository in flux-system
spec:
  targetNamespace: staging  # Installing to staging
  interval: 1m # Check for updates every 5 minutes
  chart:
    spec:
      chart: ./charts/simple-grocery-store # Path relative to GitRepository root
      sourceRef:
        kind: GitRepository
        name: simple-grocery-store
        namespace: flux-system
  values:
    global:
      imageRegistry: "crv7xod45xpq3fs.azurecr.io/" # To be provided - must include trailing slash
    frontend:
      image:
        tag: 8
    cartService:
      image:
        tag: 8
    productService:
      image:
        tag: 8